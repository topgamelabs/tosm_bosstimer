services:
  boss-timer:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    volumes:
      - /root/boss-timer:/app
    labels:
      - traefik.enable=true
      - traefik.http.routers.bosstimer.rule=Host(`www.tglabs.info`)
      - traefik.http.routers.bosstimer.entrypoints=websecure
      - traefik.http.routers.bosstimer.tls.certresolver=letsencrypt
      - traefik.http.services.bosstimer.loadbalancer.server.port=5173
    restart: unless-stopped
    network_mode: host
